#docker compose -f docker-compose-dev.yml up -d --build --no-deps
#docker compose -f docker-compose-dev.yml down
services:
  riven:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    container_name: riven
    restart: unless-stopped
    tty: true
    shm_size: 1024m
    ports:
      - "8080:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - ORIGIN=${RIVEN_ORIGIN:-http://localhost:8080}
      - RIVEN_FORCE_ENV=true
      - RIVEN_DATABASE_HOST=postgresql+psycopg2://postgres:postgres@riven_postgres/riven
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./container_data/riven:/riven/data
      - ./container_data/mount:/mount:rshared,z
    depends_on:
      riven_postgres:
        condition: service_healthy

  riven_postgres:
    image: postgres:17-alpine
    container_name: riven-db
    hostname: riven-db
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: riven
    volumes:
      - ./container_data/db:/var/lib/postgresql/data/pgdata
    networks:
      default:
        aliases:
          - riven-db
          - riven_postgres
          - postgres
    healthcheck:
      # Prefer pg_isready for boot/recovery; SELECT 1 when accepting queries.
      # NOTE: this lives in compose on the host — docker compose pull does NOT update it.
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d postgres >/dev/null 2>&1 || exit 1; err=$$(psql -U postgres -d postgres -c 'SELECT 1' 2>&1) && exit 0; echo \"$$err\" | grep -Eiq 'recovery mode|starting up|the database system is' && exit 0; exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 180s


    #     depends_on:
    #         riven:
    #             condition: service_started

    riven:
        image: spoked/riven:latest
        container_name: riven
        restart: unless-stopped
        ports:
            - "8080:8080"
        tty: true
        cap_add:
            - SYS_ADMIN
        security_opt:
            - apparmor:unconfined
        shm_size: 1024m
        devices:
            - /dev/fuse
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=America/New_York
            - RIVEN_FORCE_ENV=true
            # Prefer Compose service name for DNS; riven-db remains an alias for older configs.
            - RIVEN_DATABASE_HOST=postgresql+psycopg2://postgres:postgres@riven_postgres/riven
        healthcheck:
            test: curl -s http://localhost:8080 >/dev/null || exit 1
            interval: 30s
            timeout: 10s
            retries: 10
        volumes:
            - /path/to/riven/data:/riven/data
            - /path/to/riven/mount:/mount:rshared,z
        depends_on:
            riven_postgres:
                condition: service_healthy

    riven_postgres:
        image: postgres:17-alpine
        container_name: riven-db
        hostname: riven-db
        environment:
            - PGDATA=/var/lib/postgresql/data/pgdata
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=riven
        volumes:
            - /path/to/riven/db:/var/lib/postgresql/data/pgdata
        networks:
            default:
                aliases:
                    - riven-db
                    - riven_postgres
        healthcheck:
            # Accept crash-recovery / startup as "still starting" so compose does not
            # mark the DB unhealthy while Postgres replays WAL (backend retries separately).
            test:
                [
                    "CMD-SHELL",
                    "err=$$(psql -U postgres -d postgres -c 'SELECT 1' 2>&1) && exit 0; echo \"$$err\" | grep -Eiq 'recovery mode|starting up' && exit 0; exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 60
            start_period: 120s

    jellyfin:
        image: jellyfin/jellyfin
        container_name: jellyfin
        user: 1000:1000
        restart: unless-stopped
        ports:
        - "8096:8096"
        volumes:
        - /path/to/jellyfin/config:/config
        - /path/to/riven/mount:/mount:rslave,z

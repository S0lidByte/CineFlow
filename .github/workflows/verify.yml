name: Verify

permissions:
  contents: read

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          activate-environment: true

      - name: Install pre-requisites
        run: |
          sudo apt update
          sudo apt install -y libfuse3-dev pkg-config

      - name: Check uv.lock is in sync
        run: |
          if ! uv lock --check; then
            echo "::error::uv.lock is out of sync with pyproject.toml. Run 'uv lock' and commit the result."
            exit 1
          fi

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - uses: jakebailey/pyright-action@v1
        with:
          # Pin pyright so Verify does not drift with Pylance latest-release.
          version: 1.1.400
